---
- name: Deploy Emergency Security Patch
  hosts: all
  become: true

  tasks:
    - name: Stop web server for patching
      ansible.builtin.service:
        name: nginx
        state: stopped

    - name: Install security patch
      ansible.builtin.dnf:
        name: "{{ security_patch_package }}"
        state: present

    - name: Deploy patched configuration
      ansible.builtin.template:
        src: templates/webapp.conf.j2
        dest: /etc/nginx/conf.d/webapp.conf
        owner: root
        group: root
        mode: "0644"

    - name: Start web server with patched configuration
      ansible.builtin.service:
        name: nginx
        state: started
        enabled: true
