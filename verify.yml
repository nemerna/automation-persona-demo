---
- name: Verify Demo Environment Health
  hosts: all
  become: true

  tasks:
    - name: Check nginx service status
      ansible.builtin.service_facts:

    - name: Assert nginx is running
      ansible.builtin.assert:
        that:
          - "'nginx.service' in ansible_facts.services"
          - "ansible_facts.services['nginx.service'].state == 'running'"
        fail_msg: "FAIL: nginx is not running"
        success_msg: "OK: nginx is running"

    - name: Test HTTP response
      ansible.builtin.uri:
        url: "http://localhost"
        return_content: true
        status_code: 200
      register: http_result

    - name: Display web app status
      ansible.builtin.debug:
        msg: "Web app is healthy - HTTP {{ http_result.status }} - Content length: {{ http_result.content | length }} bytes"
