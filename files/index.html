<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Web App</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            padding: 3rem;
        }
        .status {
            display: inline-block;
            background: #00c853;
            color: #fff;
            padding: 0.4rem 1.2rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.05em;
            margin-bottom: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            color: #fff;
        }
        .subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 2.5rem;
        }
        .info {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 1.5rem 2rem;
            display: inline-block;
            text-align: left;
        }
        .info-row {
            display: flex;
            gap: 1rem;
            padding: 0.4rem 0;
        }
        .info-label {
            color: #888;
            min-width: 120px;
        }
        .info-value {
            color: #ccc;
            font-family: 'SF Mono', 'Fira Code', monospace;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status">PRODUCTION</div>
        <h1>Web Application</h1>
        <p class="subtitle">Managed by Ansible Automation Platform</p>
        <div class="info">
            <div class="info-row">
                <span class="info-label">Environment</span>
                <span class="info-value">Production</span>
            </div>
            <div class="info-row">
                <span class="info-label">Status</span>
                <span class="info-value" style="color: #00c853;">Healthy</span>
            </div>
            <div class="info-row">
                <span class="info-label">Server</span>
                <span class="info-value">nginx</span>
            </div>
            <div class="info-row">
                <span class="info-label">Version</span>
                <span class="info-value">v1.0.0</span>
            </div>
        </div>
    </div>
</body>
</html>
